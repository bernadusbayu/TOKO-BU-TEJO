<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feeling Admin - Dark Mode</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <style>
        /* TEMA DARK MODE CUSTOM */
        body { 
            background-color: #121212; /* Warna background utama yang sangat gelap */
            color: #e0e0e0; /* Teks berwarna abu-abu terang / putih */
            padding: 15px 10px 90px 10px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .title { color: #ffffff !important; }
        
        .form-section { 
            background: #1e1e1e; /* Warna card agak terang sedikit dari background */
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #333; /* Border tipis */
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
        }
        
        .section-title { 
            font-weight: bold; 
            font-size: 0.85rem; 
            margin-bottom: 15px; 
            color: #10B981; /* Warna hijau neon ala web referensi Anda */
            border-bottom: 1px solid #333; 
            padding-bottom: 8px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Styling Input dan Select agar gelap */
        .input, .textarea, .select select {
            background-color: #2a2a2a !important;
            border-color: #444 !important;
            color: #ffffff !important;
        }
        
        .input::placeholder, .textarea::placeholder { color: #888 !important; }
        
        .input:focus, .textarea:focus, .select select:focus {
            border-color: #10B981 !important; /* Hijau saat diklik */
            box-shadow: 0 0 0 0.125em rgba(16, 185, 129, 0.25) !important;
        }

        .label { color: #aaaaaa !important; }

        /* Custom Grid */
        .grid-5-col { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 5px; align-items: center; margin-bottom: 8px; }
        .grid-3-col { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 8px; align-items: center; margin-bottom: 6px; }
        .grid-header { font-size: 0.6rem; font-weight: bold; text-align: center; color: #888; border-bottom: 1px solid #444; padding-bottom: 6px; margin-bottom: 10px; }
        
        /* Footer & Tombol */
        .sticky-footer { 
            position: fixed; 
            bottom: 0; left: 0; right: 0; 
            background: #1e1e1e; 
            padding: 15px; 
            border-top: 1px solid #333; 
            z-index: 100; 
        }
        
        .button.is-primary {
            background-color: #10B981 !important; /* Hijau terang */
            color: #ffffff !important;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .button.is-primary:hover { background-color: #0ea5e9 !important; }

        /* Input Khusus (Highlight di Dark Mode) */
        .highlight-input { 
            background-color: #383800 !important; /* Kuning gelap / Olive */
            color: #ffeb3b !important; /* Angka warna kuning terang */
            border-color: #666 !important;
        }

        /* Penyesuaian teks biasa */
        .has-text-weight-bold { color: #ffffff !important; }
        hr { background-color: #333 !important; }
    </style>
</head>
<body>

    <h1 class="title is-4 has-text-centered mb-5">📋 DAILY STATION RECORD</h1>

    <form id="mainForm">
        <div class="form-section">
            <p class="section-title">INFO OPERASIONAL</p>
            <div class="columns is-mobile is-multiline">
                <div class="column is-6"><label class="label is-size-7">Regional</label>
                    <div class="select is-fullwidth is-small"><select id="reg" onchange="updateSt()"><option>Pilih...</option><option>Banjarbaru</option><option>Banjarmasin</option><option>Martapura</option></select></div>
                </div>
                <div class="column is-6"><label class="label is-size-7">Station</label>
                    <div class="select is-fullwidth is-small"><select id="st"><option>-</option></select></div>
                </div>
                <div class="column is-6"><label class="label is-size-7">Nama Pilot</label><input class="input is-small" type="text" placeholder="Ketik nama..."></div>
                <div class="column is-6"><label class="label is-size-7">Staff Office</label><input class="input is-small" type="text" placeholder="Ketik nama..."></div>
                <div class="column is-6"><label class="label is-size-7">Shift</label>
                    <div class="select is-fullwidth is-small"><select><option>Shift 1</option><option>Shift 2</option></select></div>
                </div>
                <div class="column is-6"><label class="label is-size-7">Kategori Input</label>
                    <div class="select is-fullwidth is-small">
                        <select id="kat" onchange="toggleSec()">
                            <option value="CEK IN">CEK IN</option>
                            <option value="SD-1">SD-1</option>
                            <option value="SD-2">SD-2</option>
                            <option value="SD-3">SD-3</option>
                            <option value="CEK OUT">CEK OUT</option>
                        </select>
                    </div>
                </div>
                <div class="column is-12">
                    <label class="label is-size-7" id="label-cup">Jumlah Cup (Awal)</label>
                    <input class="input is-small highlight-input" type="number" id="input-cup" placeholder="0">
                </div>
            </div>
        </div>

        <div id="sec-a" class="form-section">
            <p class="section-title">PENJUALAN PILOT [A]</p>
            <div class="grid-5-col grid-header"><div>MENU</div><div>CUP CS</div><div>CUP QR</div><div>TML CS</div><div>TML QR</div></div>
            <div id="menu-list"></div>

            <p class="is-size-7 mt-4" style="color: #10B981;"><strong>ADD ON & PENGELUARAN [OUT]</strong></p>
            <div class="columns is-mobile is-multiline mt-1">
                <div class="column is-4"><input class="input is-small" type="number" placeholder="Espr A"></div>
                <div class="column is-4"><input class="input is-small" type="number" placeholder="Espr B"></div>
                <div class="column is-4"><input class="input is-small" type="number" placeholder="Cup+Ice"></div>
                <div class="column is-6"><input class="input is-small" type="text" placeholder="Item Keluar"></div>
                <div class="column is-6"><input class="input is-small highlight-input" type="number" placeholder="Rp. Nominal"></div>
            </div>
        </div>

        <div id="sec-b" class="form-section">
            <p class="section-title">LAPORAN BAHAN BAKU [B]</p>
            
            <p class="is-size-7 mb-2" style="color: #10B981;"><strong>GRAMASI UTAMA</strong></p>
            <div class="columns is-mobile is-multiline" id="gramasi-list"></div>

            <hr>

            <div class="columns">
                <div class="column is-6">
                    <p class="is-size-7 mb-2" style="color: #10B981;"><strong>SYRUP REQUEST</strong></p>
                    <div class="grid-3-col grid-header"><div>FLAVOR</div><div>.Btl</div><div>%</div></div>
                    <div id="syrup-list"></div>
                </div>
                <div class="column is-6">
                    <p class="is-size-7 mb-2" style="color: #10B981;"><strong>WASTE STOCK [.Gr]</strong></p>
                    <div class="grid-3-col grid-header"><div>ITEM'S</div><div>S1</div><div>S2</div></div>
                    <div id="waste-list"></div>
                </div>
            </div>
        </div>

        <div id="sec-c" class="form-section">
            <p class="section-title">LAPORAN KEUANGAN [C]</p>
            <div class="field">
                <label class="label is-size-7">SALDO AWAL KASIR (Office)</label>
                <input class="input is-small" type="number" placeholder="Rp 200.000">
            </div>
            <div class="field">
                <label class="label is-size-7">CASH TO CASHIER (Besok)</label>
                <input class="input is-small" type="number" placeholder="Rp 0">
            </div>
            <div class="field">
                <label class="label is-size-7">CASH AKTUAL (Uang di Wallet)</label>
                <input class="input is-small highlight-input" type="number" placeholder="Rp 0">
            </div>
            <div class="field">
                <label class="label is-size-7">CATATAN / NOTES</label>
                <textarea class="textarea is-small" placeholder="Tulis rincian kendala jika ada..."></textarea>
            </div>
        </div>

        <div class="sticky-footer">
            <button type="submit" class="button is-primary is-fullwidth">KIRIM LAPORAN</button>
        </div>
    </form>

    <script>
        // Data Arrays
        const menus = ["OUR FEELING", "BE CAREFEELS", "HAPPY FEALS", "CHOCOFEELS", "GREENFEELS", "RED DEVEELS", "PEACE FUELS", "RUSHFEELS", "NUTFEELS", "VANFEELS", "MOCCAFEELS", "BLACKFEELS"];
        const gramasiList = ["M-GE", "M-AR", "M-CO", "M-MA", "M-RE", "UHT", "ESPRESSO", "KR-G (%)", "KR-S (%)", "S-CAR (.Btl)", "AREN (.Pck)", "MILO (.Pcs)", "ES BATU (%)", "CLEO (%)"];
        const syrupList = ["FL. CAR", "FL. BSC", "FL. IRS", "FL. HAZ", "FL. VAN", "FL. PIS"];
        const wasteList = ["M-GE", "M-AR", "M-CO", "M-MA", "M-RE", "KR-G", "KR-S", "UHT", ".SPRO"];

        // Generators
        menus.forEach(m => {
            document.getElementById('menu-list').innerHTML += `<div class="grid-5-col"><div style="font-size: 0.65rem; color:#e0e0e0;">${m}</div><input class="input is-small" type="number" placeholder="0"><input class="input is-small" type="number" placeholder="0"><input class="input is-small" type="number" placeholder="0"><input class="input is-small" type="number" placeholder="0"></div>`;
        });
        gramasiList.forEach(g => {
            document.getElementById('gramasi-list').innerHTML += `<div class="column is-4-tablet is-6-mobile py-1"><label class="label is-size-7 mb-1">${g}</label><input class="input is-small" type="number" placeholder="0"></div>`;
        });
        syrupList.forEach(s => {
            document.getElementById('syrup-list').innerHTML += `<div class="grid-3-col"><div style="font-size: 0.7rem; color:#e0e0e0;">${s}</div><input class="input is-small" type="number" placeholder="0"><input class="input is-small" type="number" placeholder="0"></div>`;
        });
        wasteList.forEach(w => {
            document.getElementById('waste-list').innerHTML += `<div class="grid-3-col"><div style="font-size: 0.7rem; color:#e0e0e0;">${w}</div><input class="input is-small" type="number" placeholder="0"><input class="input is-small" type="number" placeholder="0"></div>`;
        });

        // Update Station
        function updateSt() {
            const r = document.getElementById('reg').value;
            const s = document.getElementById('st');
            s.innerHTML = "";
            let opts = r === "Banjarbaru" ? ["Station 1","Station 2","Station 3","Station 4","Station 5","Station 6","Station 7","Station 8","Station Heritage"] : 
                       r === "Banjarmasin" ? ["Station 1","Station 2","Station 3","Station 4","Station 5","Station 6","Station 7","Station 8"] : 
                       r === "Martapura" ? ["Station 1","Station 2","Station 3","Station 4","Station 5"] : ["- Pilih -"];
            opts.forEach(o => { let el = document.createElement("option"); el.value=o; el.text=o; s.appendChild(el); });
        }

        // Toggle Sections
        function toggleSec() {
            const k = document.getElementById('kat').value;
            const labelCup = document.getElementById('label-cup');
            
            if (k === "CEK IN") labelCup.innerText = "Jumlah Cup (Awal)";
            else if (k.startsWith("SD")) labelCup.innerText = "Jumlah Cup (Add On)";
            else if (k === "CEK OUT") labelCup.innerText = "Jumlah Cup (Kembali / Rjct)";

            document.getElementById('sec-a').style.display = (k === "CEK OUT") ? "block" : "none";
            document.getElementById('sec-c').style.display = (k === "CEK OUT") ? "block" : "none";
        }
        
        toggleSec();
    </script>
</body>
</html>
