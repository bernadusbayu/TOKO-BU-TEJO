<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal System Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* TEMA MODERN DARK & AMBIENT GLOW */
        body { 
            background-color: #0f1115; 
            color: #e0e0e0; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* EFEK CAHAYA LATAR BELAKANG */
        .ambient-glow-1 {
            position: absolute;
            top: -10%; left: -10%;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: 0;
        }
        .ambient-glow-2 {
            position: absolute;
            bottom: -10%; right: -10%;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
        }
        
        .title-header { 
            color: #ffffff; 
            font-weight: 800;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 5px;
            font-size: 2rem;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .subtitle-header {
            color: #10B981;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* KARTU MENU - GLASSMORPHISM */
        .menu-btn {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px 25px;
            border-radius: 16px;
            margin-bottom: 16px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        /* EFEK HOVER & GLOW */
        .menu-btn:hover {
            transform: translateY(-4px) scale(1.02);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* WARNA AKSEN MASING-MASING MENU */
        .menu-btn.dsf:hover { box-shadow: 0 10px 30px rgba(16, 185, 129, 0.15); border-left: 4px solid #10B981; }
        .menu-btn.hq:hover { box-shadow: 0 10px 30px rgba(59, 130, 246, 0.15); border-left: 4px solid #3b82f6; }
        .menu-btn.sq:hover { box-shadow: 0 10px 30px rgba(245, 158, 11, 0.15); border-left: 4px solid #f59e0b; }

        /* DEFAULT KIRI BORDER TRANSPARAN AGAR TIDAK LOMPAT SAAT HOVER */
        .menu-btn { border-left: 4px solid transparent; }

        .menu-icon-wrapper {
            font-size: 1.8rem;
            margin-right: 20px;
            background: rgba(255,255,255,0.05);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .menu-btn:hover .menu-icon-wrapper {
            background: rgba(255,255,255,0.1);
            transform: rotate(-5deg);
        }

        .menu-text { flex-grow: 1; }
        .menu-title { font-size: 1.1rem; font-weight: 800; color: #fff; margin-bottom: 4px; }
        .menu-desc { font-size: 0.75rem; color: #888; font-weight: 400; }

        .icon-arrow {
            color: #555;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }
        
        .menu-btn:hover .icon-arrow {
            color: #fff;
            transform: translateX(5px);
        }

        /* WATERMARK / FOOTER */
        .brand-footer {
            margin-top: 50px;
            text-align: center;
            font-size: 0.7rem;
            color: #555;
            letter-spacing: 1px;
        }
        .brand-footer strong {
            color: #888;
            font-weight: 800;
        }
        .brand-footer span {
            display: block;
            margin-top: 4px;
            font-size: 0.65rem;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <div class="content-wrapper">
        <h1 class="title-header">MAIN PORTAL</h1>
        <p class="subtitle-header">Operations Hub</p>

        <a href="dsf.html" class="menu-btn dsf">
            <div class="menu-icon-wrapper">📋</div>
            <div class="menu-text">
                <div class="menu-title">DSF System</div>
                <div class="menu-desc">Daily Station Record & Financial</div>
            </div>
            <span class="icon-arrow">➔</span>
        </a>

        <a href="stockist-hq.html" class="menu-btn hq">
            <div class="menu-icon-wrapper">🏢</div>
            <div class="menu-text">
                <div class="menu-title">STOCKIST HQ</div>
                <div class="menu-desc">Headquarters Inventory Management</div>
            </div>
            <span class="icon-arrow">➔</span>
        </a>

        <a href="stockist-sq.html" class="menu-btn sq">
            <div class="menu-icon-wrapper">🏬</div>
            <div class="menu-text">
                <div class="menu-title">STOCKIST SQ</div>
                <div class="menu-desc">Sub-Quarter Inventory System</div>
            </div>
            <span class="icon-arrow">➔</span>
        </a>

        <div class="brand-footer">
            Powered by <strong>Senada CreatLabs</strong>
            <span>Digital Harmony | Innovative Creation</span>
        </div>
    </div>

</body>
</html>
