<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOCKIST HQ - Sistem Manajemen Inventory</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <style>
        body { 
            background-color: #121212; color: #e0e0e0; min-height: 100vh;
            padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .app-container {
            background: #1e1e1e; padding: 30px; border-radius: 12px;
            border: 1px solid #333; border-top: 5px solid #3b82f6;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); max-width: 1000px;
            margin: 0 auto; position: relative;
        }
        .title, .subtitle, th, td, .label { color: #ffffff !important; }
        .input, .select select { background-color: #2a2a2a; border-color: #444; color: #fff; }
        .input:focus, .select select:focus { border-color: #3b82f6; }
        .table { background-color: transparent; }
        .table th { border-bottom: 2px solid #444; }
        .table td { border-bottom: 1px solid #333; vertical-align: middle; }
        .tabs ul { border-bottom-color: #444; }
        .tabs li.is-active a { border-bottom-color: #3b82f6; color: #3b82f6; }
        .tabs a { color: #888; } .tabs a:hover { color: #fff; border-bottom-color: #fff; }
        
        #camera-container {
            display: none; flex-direction: column; align-items: center;
            margin-top: 15px; background: #000; padding: 10px; border-radius: 8px;
        }
        video, canvas { max-width: 100%; border-radius: 8px; }
        .photo-preview { display: none; margin-top: 10px; max-width: 200px; border-radius: 8px; border: 2px solid #3b82f6; }

        #loading-overlay {
            display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(18, 18, 18, 0.85); z-index: 1000;
            justify-content: center; align-items: center; border-radius: 12px; flex-direction: column;
        }
        .loader-spinner {
            border: 5px solid #333; border-top: 5px solid #3b82f6;
            border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <img id="watermark-logo" src="PASTE_KODE_PANJANG_BASE64_DI_SINI" style="display: none;">

    <div class="app-container">
        <div id="loading-overlay">
            <div class="loader-spinner"></div>
            <p class="mt-3 has-text-weight-bold has-text-info" id="loading-text">Memproses...</p>
        </div>

        <h1 class="title is-4">🏢 STOCKIST HQ</h1>
        <p class="subtitle is-6">Sistem Manajemen Inventory Terpadu</p>

        <div class="tabs is-centered">
            <ul>
                <li class="is-active" id="tab-stok" onclick="switchTab('stok')"><a>📦 Data Stok</a></li>
                <li id="tab-baru" onclick="switchTab('baru')"><a>➕ Item Baru</a></li>
                <li id="tab-masuk" onclick="switchTab('masuk')"><a>📥 Barang Masuk</a></li>
                <li id="tab-keluar" onclick="switchTab('keluar')"><a>📤 Barang Keluar</a></li>
                <li id="tab-riwayat" onclick="switchTab('riwayat')"><a>🕒 Riwayat</a></li>
            </ul>
        </div>

        <div id="view-stok" class="view-section">
            <button class="button is-small is-info is-outlined mb-3" onclick="fetchData()">🔄 Muat Ulang Data</button>
            <table class="table is-fullwidth is-hoverable">
                <thead>
                    <tr>
                        <th>Kode</th>
                        <th>Nama Barang</th>
                        <th class="has-text-centered">Total Stok</th>
                    </tr>
                </thead>
                <tbody id="table-body-stok">
                    <tr><td colspan="3" class="has-text-centered">Mengambil data dari Server...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="view-baru" class="view-section" style="display: none;">
            <div class="columns is-centered mt-4">
                <div class="column is-half">
                    <div class="field">
                        <label class="label">Kode Barang</label>
                        <div class="control"><input class="input" type="text" id="new-kode" placeholder="Contoh: BRG-003"></div>
                    </div>
                    <div class="field">
                        <label class="label">Nama Barang</label>
                        <div class="control"><input class="input" type="text" id="new-nama" placeholder="Contoh: Gula Pasir 1kg"></div>
                    </div>
                    <button class="button is-link is-fullwidth mt-4" onclick="tambahBarangBaru()">Simpan Master Barang</button>
                </div>
            </div>
        </div>

        <div id="view-masuk" class="view-section" style="display: none;">
            <div class="columns mt-4">
                <div class="column is-half">
                    <div class="field">
                        <label class="label">Pilih Barang</label>
                        <div class="control"><div class="select is-fullwidth"><select id="in-barang"></select></div></div>
                    </div>
                    <div class="field">
                        <label class="label">Nama PIC</label>
                        <div class="control"><input class="input" type="text" id="in-pic" placeholder="Nama Staff"></div>
                    </div>
                    <div class="columns">
                        <div class="column"><label class="label">Tanggal</label><input class="input" type="date" id="in-tanggal"></div>
                        <div class="column"><label class="label">Jam</label><input class="input" type="time" id="in-jam"></div>
                    </div>
                    <div class="field">
                        <label class="label">Jumlah Masuk</label>
                        <div class="control"><input class="input" type="number" id="in-jumlah" min="1" placeholder="0"></div>
                    </div>
                </div>
                <div class="column is-half has-text-centered">
                    <label class="label">Dokumentasi Foto</label>
                    <button class="button is-info is-light" onclick="bukaKamera('in')">📷 Buka Kamera</button>
                    <img id="in-photo-preview" class="photo-preview mx-auto">
                </div>
            </div>
            <button class="button is-success is-fullwidth mt-4" onclick="prosesTransaksi('masuk')">Proses Barang Masuk</button>
        </div>

        <div id="view-keluar" class="view-section" style="display: none;">
            <div class="columns mt-4">
                <div class="column is-half">
                    <div class="field">
                        <label class="label">Pilih Barang</label>
                        <div class="control"><div class="select is-fullwidth"><select id="out-barang"></select></div></div>
                    </div>
                    <div class="field">
                        <label class="label">Nama PIC</label>
                        <div class="control"><input class="input" type="text" id="out-pic" placeholder="Nama Staff"></div>
                    </div>
                    <div class="columns">
                        <div class="column"><label class="label">Tanggal</label><input class="input" type="date" id="out-tanggal"></div>
                        <div class="column"><label class="label">Jam</label><input class="input" type="time" id="out-jam"></div>
                    </div>
                    <div class="field">
                        <label class="label">Jumlah Keluar</label>
                        <div class="control"><input class="input" type="number" id="out-jumlah" min="1" placeholder="0"></div>
                    </div>
                </div>
                <div class="column is-half has-text-centered">
                    <label class="label">Dokumentasi Foto</label>
                    <button class="button is-danger is-light" onclick="bukaKamera('out')">📷 Buka Kamera</button>
                    <img id="out-photo-preview" class="photo-preview mx-auto">
                </div>
            </div>
            <button class="button is-danger is-fullwidth mt-4" onclick="prosesTransaksi('keluar')">Proses Barang Keluar</button>
        </div>
        
        <div id="view-riwayat" class="view-section" style="display: none;">
            <button class="button is-small is-info is-outlined mb-3" onclick="fetchData()">🔄 Muat Ulang Riwayat</button>
            <div class="table-container">
                <table class="table is-fullwidth is-hoverable is-narrow text-sm">
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>Tipe</th>
                            <th>Barang</th>
                            <th class="has-text-centered">Jml</th>
                            <th>PIC</th>
                            <th>Dokumentasi</th>
                        </tr>
                    </thead>
                    <tbody id="table-body-riwayat">
                        <tr><td colspan="6" class="has-text-centered">Mengambil data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="camera-container">
            <video id="video" autoplay playsinline></video>
            <button class="button is-warning mt-3" id="snap-btn">📸 Ambil Foto</button>
            <canvas id="canvas" style="display:none;"></canvas>
            <button class="button is-dark mt-2" onclick="tutupKamera()">Batal / Tutup Kamera</button>
        </div>
    </div>

    <script>
        // ==========================================
        // GANTI URL DI BAWAH INI DENGAN URL WEB APP ANDA
        // ==========================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLQ8L6mJL8IgbHKykqpCK6SVqxVpIfsnw5bLzqUfkqFw6pqO39aT9mfGgy_5Ek6bEH/exec";
        
        let inventory = [];
        let transactionLog = [];
        let modeKameraAktif = ''; 
        let stream = null; 
        
        // Variabel untuk Lokasi Alamat
        let currentLocation = "Lokasi: Mencari alamat GPS...";

        // Fungsi Loading UI
        function showLoading(text = "Memproses...") {
            document.getElementById('loading-text').innerText = text;
            document.getElementById('loading-overlay').style.display = 'flex';
        }
        function hideLoading() {
            document.getElementById('loading-overlay').style.display = 'none';
        }

        // Ambil Data dari Google Sheets (Stok & Riwayat)
        async function fetchData() {
            if(SCRIPT_URL === "TARUH_URL_WEB_APP_ANDA_DI_SINI") {
                alert("URL Web App belum dimasukkan di kode script!");
                return;
            }
            showLoading("Mengambil data terbaru...");
            try {
                const response = await fetch(SCRIPT_URL);
                const result = await response.json();
                if(result.status === "success") {
                    inventory = result.data.stok;
                    transactionLog = result.data.log;
                    renderTabelStok();
                    renderTabelRiwayat();
                    updateDropdowns();
                } else {
                    alert("Error: " + result.message);
                }
            } catch (error) {
                alert("Gagal terhubung ke server. Pastikan koneksi internet aktif.");
            }
            hideLoading();
        }

        // Dapatkan Titik GPS & Terjemahkan ke Nama Jalan
        function initLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        currentLocation = `Lat: ${lat.toFixed(5)}, Lon: ${lon.toFixed(5)}`; // Fallback awal

                        try {
                            // Mengubah Kordinat menjadi nama jalan (Reverse Geocoding OpenStreetMap API)
                            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                            const data = await response.json();
                            if(data && data.display_name) {
                                // Ambil 3 bagian pertama saja agar teks tidak terlalu panjang memenuhi layar
                                const addressParts = data.display_name.split(', ');
                                currentLocation = addressParts.slice(0, 3).join(', ');
                            }
                        } catch (err) {
                            console.log("Geocoding gagal, menggunakan titik koordinat.");
                        }
                    },
                    (error) => {
                        currentLocation = "Lokasi GPS tidak diizinkan/tersedia";
                    },
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            } else {
                currentLocation = "Browser tidak mendukung GPS";
            }
        }

        // Navigasi Tab
        function switchTab(tabName) {
            document.querySelectorAll('.view-section').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.tabs li').forEach(el => el.classList.remove('is-active'));
            document.getElementById(`view-${tabName}`).style.display = 'block';
            document.getElementById(`tab-${tabName}`).classList.add('is-active');

            if (tabName === 'masuk' || tabName === 'keluar') setWaktuOtomatis(tabName);
            tutupKamera(); 
        }

        function renderTabelStok() {
            const tbody = document.getElementById('table-body-stok');
            tbody.innerHTML = '';
            if(inventory.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="has-text-centered">Belum ada data barang.</td></tr>';
                return;
            }
            inventory.forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${item.kode}</strong></td>
                        <td>${item.nama}</td>
                        <td class="has-text-centered"><span class="tag is-info is-medium">${item.stok}</span></td>
                    </tr>`;
            });
        }
        
        function renderTabelRiwayat() {
            const tbody = document.getElementById('table-body-riwayat');
            tbody.innerHTML = '';
            if(transactionLog.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="has-text-centered">Belum ada riwayat transaksi.</td></tr>';
                return;
            }
            
            transactionLog.forEach(log => {
                let badgeClass = log.tipe === 'masuk' ? 'is-success' : 'is-danger';
                let tipeTeks = log.tipe === 'masuk' ? 'Masuk' : 'Keluar';
                let fotoBtn = log.foto ? `<a href="${log.foto}" target="_blank" class="button is-small is-link is-light">Lihat</a>` : '-';

                tbody.innerHTML += `
                    <tr>
                        <td style="font-size: 0.85em;">${log.tanggal}<br>${log.jam}</td>
                        <td><span class="tag ${badgeClass} is-light">${tipeTeks}</span></td>
                        <td style="font-size: 0.9em;"><strong>${log.kode}</strong><br>${log.nama}</td>
                        <td class="has-text-centered has-text-weight-bold">${log.jumlah}</td>
                        <td>${log.pic}</td>
                        <td>${fotoBtn}</td>
                    </tr>`;
            });
        }

        function updateDropdowns() {
            const selectIn = document.getElementById('in-barang');
            const selectOut = document.getElementById('out-barang');
            const options = '<option value="">-- Pilih Barang --</option>' + 
                inventory.map((item, index) => `<option value="${index}">${item.kode} - ${item.nama}</option>`).join('');
            selectIn.innerHTML = options;
            selectOut.innerHTML = options;
        }

        // Set Waktu Format Sesuai Standar Input Browser
        function setWaktuOtomatis(tipe) {
            const now = new Date();
            
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            document.getElementById(`${tipe}-tanggal`).value = `${year}-${month}-${day}`;
            document.getElementById(`${tipe}-jam`).value = `${hours}:${minutes}`;
        }

        // POST Data: Tambah Barang
        async function tambahBarangBaru() {
            const kode = document.getElementById('new-kode').value.trim();
            const nama = document.getElementById('new-nama').value.trim();

            if (!kode || !nama) return alert("Kode dan Nama barang wajib diisi!");
            if (inventory.some(item => item.kode === kode)) return alert("Kode barang ini sudah terdaftar!");

            showLoading("Menyimpan Master Barang...");
            try {
                const payload = { action: "tambah_barang", kode: kode, nama: nama };
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if(result.status === "success") {
                    alert("Barang berhasil ditambahkan!");
                    document.getElementById('new-kode').value = '';
                    document.getElementById('new-nama').value = '';
                    await fetchData(); 
                    switchTab('stok');
                } else {
                    alert("Gagal: " + result.message);
                }
            } catch (err) {
                alert("Gagal mengirim data.");
            }
            hideLoading();
        }

        // POST Data: Transaksi
        async function prosesTransaksi(tipe) {
            const prefix = tipe === 'masuk' ? 'in' : 'out';
            const itemIndex = document.getElementById(`${prefix}-barang`).value;
            const pic = document.getElementById(`${prefix}-pic`).value.trim();
            const tanggal = document.getElementById(`${prefix}-tanggal`).value;
            const jam = document.getElementById(`${prefix}-jam`).value;
            const jumlah = parseInt(document.getElementById(`${prefix}-jumlah`).value);
            const photoSrc = document.getElementById(`${prefix}-photo-preview`).src;

            if (itemIndex === "" || !pic || !tanggal || !jam || isNaN(jumlah) || jumlah <= 0) {
                return alert("Lengkapi semua data! (Pilih barang, PIC, Tanggal, Jam, dan Jumlah > 0)");
            }
            if (!photoSrc || photoSrc === window.location.href) {
                return alert("Wajib melampirkan foto barang!");
            }

            const item = inventory[itemIndex];
            if (tipe === 'keluar' && item.stok < jumlah) {
                return alert(`Gagal: Stok tidak cukup! Stok saat ini hanya ${item.stok}.`);
            }

            const id_transaksi = "TX-" + Date.now();

            showLoading("Memproses Transaksi & Mengunggah Foto...");
            try {
                const payload = {
                    action: "transaksi", id_transaksi: id_transaksi, tanggal: tanggal, jam: jam,
                    tipe: tipe, kode: item.kode, nama: item.nama, jumlah: jumlah, pic: pic, fotoBase64: photoSrc
                };
                
                const response = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
                const result = await response.json();
                
                if(result.status === "success") {
                    alert("Transaksi berhasil dicatat!");
                    document.getElementById(`${prefix}-pic`).value = '';
                    document.getElementById(`${prefix}-jumlah`).value = '';
                    document.getElementById(`${prefix}-photo-preview`).style.display = 'none';
                    document.getElementById(`${prefix}-photo-preview`).src = '';
                    
                    await fetchData(); 
                    switchTab('stok');
                } else {
                    alert("Gagal memproses transaksi: " + result.message);
                }
            } catch (err) {
                alert("Terjadi kesalahan jaringan.");
            }
            hideLoading();
        }

        // KAMERA API DENGAN WATERMARK
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const cameraContainer = document.getElementById('camera-container');
        const logoImg = document.getElementById('watermark-logo'); // Ambil dari tag HTML

        async function bukaKamera(tipe) {
            modeKameraAktif = tipe; 
            cameraContainer.style.display = 'flex';
            
            initLocation(); 

            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
            } catch (err) {
                alert("Tidak dapat mengakses kamera. Pastikan browser memberikan izin.");
                tutupKamera();
            }
        }

        document.getElementById('snap-btn').addEventListener('click', () => {
            if (!stream) return;
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            
            // 1. Gambar Video Dasar
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 2. Tempel Logo di Kanan Atas (15% dari Lebar Layar)
            if (logoImg && logoImg.complete && logoImg.naturalHeight !== 0) {
                const logoWidth = canvas.width * 0.15; 
                const logoHeight = (logoImg.naturalHeight / logoImg.naturalWidth) * logoWidth;
                const padding = 20;
                context.drawImage(logoImg, canvas.width - logoWidth - padding, padding, logoWidth, logoHeight);
            }

            // 3. Teks Waktu & Alamat Lokasi
            const now = new Date();
            const timeStr = now.toLocaleString('id-ID'); 
            const textL1 = `Waktu: ${timeStr}`;
            const textL2 = currentLocation;

            const fontSize = Math.max(14, Math.floor(canvas.width * 0.03)); 
            context.font = `bold ${fontSize}px Arial`;

            context.fillStyle = "rgba(0, 0, 0, 0.6)"; 
            const boxPadding = 12;
            const textWidth1 = context.measureText(textL1).width;
            const textWidth2 = context.measureText(textL2).width;
            const maxTextWidth = Math.max(textWidth1, textWidth2);
            
            // Gambar kotak background hitam transparan
            context.fillRect(10, canvas.height - (fontSize * 2) - 35, maxTextWidth + (boxPadding * 2), (fontSize * 2) + 25);

            // Tulis Teks putih di atasnya
            context.fillStyle = "#ffffff"; 
            context.fillText(textL1, 10 + boxPadding, canvas.height - fontSize - 20);
            context.fillText(textL2, 10 + boxPadding, canvas.height - 10);
            
            // Konversi menjadi gambar JPEG dengan kompresi 70%
            const photoDataUrl = canvas.toDataURL('image/jpeg', 0.7); 
            
            const previewImg = document.getElementById(`${modeKameraAktif}-photo-preview`);
            previewImg.src = photoDataUrl;
            previewImg.style.display = 'block';
            tutupKamera();
        });

        function tutupKamera() {
            if (stream) { stream.getTracks().forEach(track => track.stop()); stream = null; }
            cameraContainer.style.display = 'none';
        }

        // Jalankan saat pertama kali dibuka
        window.onload = () => {
            fetchData();
            initLocation(); 
        };
    </script>
</body>
</html>
